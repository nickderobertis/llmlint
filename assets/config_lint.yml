# llmlint config-lint plugin (bundled; referenced by URL,
# .../assets/config_lint.yml, and resolved offline from the embedded copy).
#
# Lints llmlint configuration files themselves: that rules are well-named and
# their descriptions yield a clear, unambiguous verdict. These are judgment
# checks; structural checks (unique names, valid identifiers, resolvable agents)
# are enforced deterministically by llmlint at load time and are intentionally
# not duplicated here.
#
# `version` is the published plugin version consumers pin with `@` (e.g. `@1`).
version: 1

agents:
  config_lint:
    # Scope these rules to llmlint config files regardless of the CLI's target
    # files, so the plugin always lints configuration, not source.
    files:
      include:
        - "**/llmlint.yml"
        - "**/llmlint.yaml"
        - "**/.llmlint.yml"
        - "**/.llmlint.yaml"
        - "**/*.llmlint.yml"
        - "**/*.llmlint.yaml"
    prompt_template: |
      You are reviewing llmlint configuration files. Each file declares lint
      `rules`, where every rule has a `name` and a `description`. Evaluate the
      rules defined in the target config files against the checks below. When a
      check fails, cite the config file and the line of the offending rule's
      `name` so the author can jump straight to it.

# Every check localizes its findings to the offending rule (require_line_attribution:
# true) — a config-lint violation always points at a concrete file + line, which is
# itself the best practice these rules enforce for the configs they lint.
rules:
  - name: description_yields_clear_verdict
    agent: config_lint
    require_line_attribution: true
    description: |
      Every lint rule's `description` states a single, unambiguous property
      whose truth determines the verdict — written either as a plain invariant
      (just the condition for the property to hold) or, when the violating case
      carries meaningful detail such as concrete examples, by stating both the
      holding and the violating conditions so they are mutually exclusive.
      Flag a description that is ambiguous, conflates several unrelated
      properties, or whose stated holding and violating conditions overlap.

  - name: name_is_descriptive_not_placeholder
    agent: config_lint
    require_line_attribution: true
    description: |
      true when every lint rule `name` is a descriptive, meaningful identifier
      that conveys what the rule checks. false when any name is a placeholder or
      nonsense token (for example rule1, foo, bar, baz, test, todo, asdf, temp,
      thing, xxx) that does not describe what is being checked.

  - name: name_matches_description
    agent: config_lint
    require_line_attribution: true
    description: |
      true when every lint rule `name` describes the same property that its
      `description` actually checks. false when any name refers to something
      different from what its description evaluates.

  - name: relevance_scopes_conditional_rules
    agent: config_lint
    require_line_attribution: true
    description: |
      A lint rule keeps its verdict a clean pass/fail rather than bolting an
      applicability escape hatch onto the `description`. It holds when a rule that
      only applies in certain situations expresses that with a `relevance:`
      condition. It is violated when a `description` carries an inline "or not
      applicable" / "if present" / "when relevant" style clause that a `relevance:`
      condition should express instead.
