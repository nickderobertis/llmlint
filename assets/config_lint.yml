# llmlint config-lint plugin (bundled; referenced by URL,
# .../assets/config_lint.yml, and resolved offline from the embedded copy).
#
# Lints llmlint configuration files themselves: that rules are well-named and
# their descriptions yield a clear, unambiguous verdict in as few tokens as that
# takes. These are judgment checks; structural checks (unique names, valid
# identifiers, resolvable agents) are enforced deterministically by llmlint at
# load time and are intentionally not duplicated here.
#
# These rules use the **default agent** on purpose: a dedicated agent would force
# a separate judge invocation (batching is per-agent), doubling model usage for a
# small project that just wants these checks. Running on the default agent lets
# them batch with the consumer's own rules into one call — the per-file
# applicability keeps each rule scoped to its own files. Each rule scopes itself
# to config files with its own `files` filter (shared via the `&config_files`
# YAML anchor), so the plugin always lints configuration, not source, regardless
# of the CLI's target files.
#
# `version` is the published plugin version consumers pin with `@` (e.g. `@1`).
# A minor bump (new rule, backward-compatible) still satisfies an existing `@1`
# pin, so consumers pick it up with no pin change; bump the major only on an
# incompatible change (see AGENTS.md).
version: 1.2

# Every check localizes its findings to the offending rule (require_line_attribution:
# true) — a config-lint violation always points at a concrete file + line, which is
# itself the best practice these rules enforce for the configs they lint. Each rule
# below is phrased to pass its own checks (llmlint dogfoods this plugin).
rules:
  - name: description_yields_clear_verdict
    # The first rule anchors the config-file globs; the others alias it (`*config_files`)
    # so the scope stays in one place.
    files: &config_files
      include:
        - "**/llmlint.yml"
        - "**/llmlint.yaml"
        - "**/.llmlint.yml"
        - "**/.llmlint.yaml"
        - "**/*.llmlint.yml"
        - "**/*.llmlint.yaml"
    require_line_attribution: true
    description: |
      Every lint rule's `description` states one unambiguous property whose truth
      is the verdict — written as a plain invariant naming just the condition for
      the property to hold, or, only when the violating case adds detail the
      positive statement leaves unclear (such as concrete examples), as mutually
      exclusive holding and violating conditions.

  - name: name_describes_what_the_rule_checks
    files: *config_files
    require_line_attribution: true
    description: |
      Every lint rule `name` is a descriptive identifier that conveys the property
      its `description` checks — a meaningful token, never a placeholder or nonsense
      one (for example rule1, foo, bar, baz, test, todo, asdf, temp, thing, xxx),
      that names the same thing the description evaluates.

  - name: relevance_scopes_conditional_rules
    files: *config_files
    require_line_attribution: true
    description: |
      A lint rule that only applies in some situations expresses that with a
      `relevance:` condition rather than an inline applicability clause in its
      `description` (for example "or not applicable", "if present", "when
      relevant"), keeping the verdict a clean pass/fail.

  - name: path_scoped_rules_use_files_not_relevance
    files: *config_files
    require_line_attribution: true
    description: |
      A lint rule that applies only to a subset of files identifiable by path — a
      file type or extension (for example only `*.py`) or a location or directory
      (for example only files under `src/`) — declares that subset with `files`
      globs rather than a `relevance:` condition, since a path scope is
      deterministic and spends no judge tokens; `relevance` is reserved for
      conditions on a file's content or changes that a glob cannot express.

  - name: description_omits_already_excluded_situations
    files: *config_files
    require_line_attribution: true
    # Complement to `relevance_scopes_conditional_rules`: that rule catches a
    # missing `relevance:` (an inline "or not applicable" that should be a
    # condition); this one catches the inverse — a description restating behavior
    # for a case the rule's own scope already excludes.
    description: |
      A lint rule's `description` specifies behavior only for situations the rule
      actually evaluates, never stating a property, exception, or caveat for a case
      its own `relevance:` condition or `files` scope already excludes (for example
      a rule scoped by `files` to `*.py` adding "for Python files" or "non-Python
      files are exempt", or one whose `relevance` gates a condition that the
      description then repeats) — the excluded case never reaches the judge, so the
      redundant clause only spends tokens and blurs the verdict.

  - name: description_and_relevance_are_concise
    files: *config_files
    require_line_attribution: true
    description: |
      Every rule's `description` and any `relevance` condition state their point in
      the fewest words that keep the verdict unambiguous — no filler, no restating
      the inverse, no narrative beyond the check. A judge call batches an agent's
      rules into one prompt, so tokens one rule wastes degrade the judge on the
      others; extra length is warranted only when it adds clarity the shorter form
      lacks, such as concrete examples or easily-confused edge cases.

  - name: line_localizable_rules_require_attribution
    files: *config_files
    require_line_attribution: true
    description: |
      A lint rule sets `require_line_attribution: true` exactly when every violation
      its `description` permits can be pinned to specific line(s) containing the
      concrete offending token, statement, directive, comment, declaration, or config
      key, and omits the field when a violation is inherently cross-cutting and cannot
      be pinned to one source line, such as agreement across files or a whole-file or
      architectural property.
