# llmlint config-lint plugin (bundled; referenced by URL,
# .../assets/config_lint.yml, and resolved offline from the embedded copy).
#
# Lints llmlint configuration files themselves: that rules are well-named and
# their descriptions yield a clear, unambiguous verdict. These are judgment
# checks; structural checks (unique names, valid identifiers, resolvable agents)
# are enforced deterministically by llmlint at load time and are intentionally
# not duplicated here.
#
# `version` is the published plugin version consumers pin with `@` (e.g. `@1`).
version: 1

agents:
  config_lint:
    # Scope these rules to llmlint config files regardless of the CLI's target
    # files, so the plugin always lints configuration, not source.
    files:
      include:
        - "**/llmlint.yml"
        - "**/llmlint.yaml"
        - "**/.llmlint.yml"
        - "**/.llmlint.yaml"
        - "**/*.llmlint.yml"
        - "**/*.llmlint.yaml"
    prompt_template: |
      You are reviewing llmlint configuration files. Each file declares lint
      `rules`, where every rule has a `name` and a `description`. Evaluate the
      rules defined in the target config files against the checks below. When a
      check fails, cite the config file and the line of the offending rule's
      `name` so the author can jump straight to it.

# Every check localizes its findings to the offending rule (require_line_attribution:
# true) — a config-lint violation always points at a concrete file + line, which is
# itself the best practice these rules enforce for the configs they lint. Each rule
# below is phrased to pass its own checks (llmlint dogfoods this plugin).
rules:
  - name: description_yields_clear_verdict
    agent: config_lint
    require_line_attribution: true
    description: |
      Every lint rule's `description` states one unambiguous property whose truth
      is the verdict — written as a plain invariant naming just the condition for
      the property to hold, or, only when the violating case adds detail the
      positive statement leaves unclear (such as concrete examples), as mutually
      exclusive holding and violating conditions.

  - name: name_describes_what_the_rule_checks
    agent: config_lint
    require_line_attribution: true
    description: |
      Every lint rule `name` is a descriptive identifier that conveys the property
      its `description` checks — a meaningful token, never a placeholder or nonsense
      one (for example rule1, foo, bar, baz, test, todo, asdf, temp, thing, xxx),
      that names the same thing the description evaluates.

  - name: relevance_scopes_conditional_rules
    agent: config_lint
    require_line_attribution: true
    description: |
      A lint rule that only applies in some situations expresses that with a
      `relevance:` condition rather than an inline applicability clause in its
      `description` (for example "or not applicable", "if present", "when
      relevant"), keeping the verdict a clean pass/fail.
