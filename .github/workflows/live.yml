name: Live e2e

# The live tier: the built llmlint binary -> real oneharness -> a real harness
# (claude-code), end to end, making real (paid) model calls. Runs on PRs and
# pushes to main, plus on demand. Out of the `check` gate (`ci.yml`).
#
# What this proves that the hermetic suite can't: the whole stack works on each
# OS — the real binary, the oneharness subprocess, and a real harness round-trip
# on Linux, macOS, and Windows. Harness *breadth* (codex, cursor, …) is
# oneharness's own test surface; from llmlint's side every harness is the same
# `--harness <id>` handed to oneharness, so one canonical harness is enough here.
#
# A missing CLI/auth/oneharness is a HARD FAILURE (the script does not skip), so a
# broken live setup turns this workflow red. Configure `CLAUDE_CODE_OAUTH_TOKEN`
# (or `ANTHROPIC_API_KEY`) and, optionally, the `CLAUDE_E2E_MODEL` repo variable.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: live-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live:
    # Only where the auth secret is available: the canonical repo, and never a
    # fork PR (forks can't read secrets, and the run would correctly hard-fail).
    if: >-
      github.repository == 'nickderobertis/llmlint' &&
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.full_name == github.repository)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: Install oneharness (runtime prerequisite, on PATH)
        run: |
          cargo install --git https://github.com/nickderobertis/oneharness --locked
          oneharness --version
      - name: Install the claude-code CLI
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version
      - name: Live e2e against the real claude-code harness
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_E2E_MODEL: ${{ vars.CLAUDE_E2E_MODEL }}
        run: just live-claude
