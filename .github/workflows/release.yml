name: Release

# Build, archive, checksum, and attach the cross-platform binaries for a
# published GitHub Release.
#
# The Release itself is created by release-plz (see release-plz.yml) when a
# version-bump PR merges. Because release-plz uses a PAT, that Release fires the
# `release: published` event below; this workflow then re-gates on the tests and
# uploads the archives + checksums. Creating a Release by hand in the GitHub UI
# is the supported manual fallback — it triggers the same event.

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # crates.io publishing self-activates when the CARGO_REGISTRY_TOKEN secret
  # exists — no extra repo variable to set. `secrets` cannot be read in a job
  # `if:`, so (mirroring release-plz.yml's guard) this job reads the token into
  # an env var and exposes whether it is present as an output the publish jobs
  # gate on. Until the secret is added, publishing stays dormant.
  guard:
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.check.outputs.publish }}
    steps:
      - id: check
        env:
          TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "CARGO_REGISTRY_TOKEN not set; skipping crates.io publish." >&2
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

  # Gate the release on a passing run of the same checks CI enforces, so a tag
  # can never publish an artifact that would not pass the gate.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: just,nextest
      - run: just lint
      - run: cargo nextest run --features mock-oneharness --locked

  upload:
    name: upload (${{ matrix.target }})
    needs: test
    permissions:
      contents: write
      # Keyless Sigstore signing: `id-token` mints the GitHub Actions OIDC
      # identity the provenance is bound to; `attestations` records it. No repo
      # secret or long-lived key is involved.
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native runners per target so nothing needs cross-compilation.
          # `ext` names the archive the upload action leaves in the workspace,
          # which the attestation step then signs.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            ext: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            ext: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Build, archive, checksum, and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: llmlint
          target: ${{ matrix.target }}
          archive: $bin-$tag-$target
          checksum: sha256
          include: README.md,LICENSE,CHANGELOG.md
          token: ${{ secrets.GITHUB_TOKEN }}
      # Sign a Sigstore build-provenance attestation for the archive. The upload
      # action leaves the archive at the workspace root; attesting it here proves
      # the artifact was built by this workflow — a trust root independent of any
      # mirror the archive might later be downloaded from. Keyless: no secret.
      - name: Attest build provenance
        id: attest
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: llmlint-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.ext }}
      # Publish the Sigstore bundle as a release asset (next to the archive and
      # its .sha256). Shipping the bundle — rather than relying on GitHub's
      # attestation API — is what lets scripts/install.sh verify OFFLINE with
      # `cosign` (or `gh --bundle`) after downloading everything from a mirror,
      # which is the whole point for networks that can't reach github.com. The
      # signature is bound to this workflow's OIDC identity, so a mirror serving
      # the bundle cannot forge it.
      - name: Publish attestation bundle to the release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bundle="llmlint-${GITHUB_REF_NAME}-${{ matrix.target }}.sigstore.json"
          cp "${{ steps.attest.outputs.bundle-path }}" "$bundle"
          gh release upload "$GITHUB_REF_NAME" "$bundle" --clobber

  # Prove the offline verification path end to end on every real release: install
  # the verifiers the easy ways (the official cosign installer action; `pip
  # install sigstore` from PyPI) and run the EXACT commands scripts/install.sh
  # uses against a just-published archive + its bundle. This is the only place
  # the real invocations meet a genuine GitHub-OIDC-signed bundle, so it is what
  # keeps install.sh's flags (--new-bundle-format, --type, the pinned
  # identity/issuer, `verify github --offline --repository`) honest — a mismatch
  # reddens the release instead of silently degrading users to the checksum
  # fallback. Downloads from canonical GitHub (no mirror needed) since it is only
  # exercising the verifiers.
  verify-attestation:
    needs: upload
    runs-on: ubuntu-latest
    steps:
      # Pin >= 2.4.0: --new-bundle-format (new Sigstore bundle) lands there, and
      # the action's unpinned default can be older.
      - uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # The registry-only bootstrap install.sh recommends for hosts that can't
      # reach github.com; pinned to a version known to verify DSSE bundles
      # offline.
      - run: pip install sigstore==4.3.0
      - name: Verify a release archive against its Sigstore bundle
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="$GITHUB_REF_NAME"
          target="x86_64-unknown-linux-gnu"
          base="llmlint-${tag}-${target}"
          gh release download "$tag" --dir . \
            --pattern "${base}.tar.gz" --pattern "${base}.sigstore.json"
          cosign verify-blob-attestation \
            --new-bundle-format \
            --bundle "${base}.sigstore.json" \
            --type "https://slsa.dev/provenance/v1" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity-regexp "^https://github.com/${GITHUB_REPOSITORY}/\.github/workflows/release\.yml@" \
            "${base}.tar.gz"
          echo "cosign verified ${base}.tar.gz."
          sigstore verify github \
            --bundle "${base}.sigstore.json" \
            --offline \
            --repository "$GITHUB_REPOSITORY" \
            "${base}.tar.gz"
          echo "sigstore-python verified ${base}.tar.gz."

  # crates.io publishing: runs whenever the CARGO_REGISTRY_TOKEN secret is set
  # (see the `guard` job). Gated on the same `test` job as the binary upload (so
  # a crate version never publishes without a green gate) but it does NOT depend
  # on `upload` — a flaky per-platform binary upload must not block the immutable
  # crate publish, and a publish hiccup must not block the binary attachments.
  # Kept out of release-plz (publish = false there) so versioning/tagging stays
  # decoupled from the registry push.
  publish-crate:
    needs: [guard, test]
    if: ${{ needs.guard.outputs.publish == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Post-publish gate: prove the just-published version is actually installable
  # from crates.io. crates.io propagation is not instant, so poll the sparse
  # index until the version is queryable, then `cargo install` it from the
  # registry and smoke-test the real artifact — the same checks the `install` CI
  # job runs, but against the published crate instead of the local source. If
  # this fails, the crate is already public (immutable); it surfaces a broken
  # release rather than gating the publish.
  verify-crate:
    needs: [guard, publish-crate]
    if: ${{ needs.guard.outputs.publish == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: dtolnay/rust-toolchain@stable
      - name: Wait for the version to land on crates.io
        run: |
          ver="${GITHUB_REF_NAME#v}"
          index="https://index.crates.io/ll/ml/llmlint"
          echo "Waiting for llmlint $ver in the crates.io index..."
          for i in $(seq 1 30); do
            if curl -fsSL "$index" 2>/dev/null | grep -q "\"vers\":\"$ver\""; then
              echo "llmlint $ver is available in the index."
              exit 0
            fi
            echo "  attempt $i: not indexed yet; sleeping 10s..."
            sleep 10
          done
          echo "::error::llmlint $ver did not appear on crates.io within ~5 minutes"
          exit 1
      - name: Install from crates.io and smoke-test
        run: |
          ver="${GITHUB_REF_NAME#v}"
          cargo install llmlint --version "$ver" --locked --root "$RUNNER_TEMP/cargo-install"
          export PATH="$RUNNER_TEMP/cargo-install/bin:$PATH"
          installed="$(llmlint --version)"
          echo "installed: $installed"
          case "$installed" in
            *"$ver"*) ;;
            *) echo "::error::installed version mismatch: '$installed' does not contain '$ver'"; exit 1 ;;
          esac
          llmlint --help >/dev/null
          work="$(mktemp -d)"
          cd "$work"
          llmlint init
          llmlint config
          echo "crates.io install + smoke test passed for llmlint $ver"
