# screencomp configuration. See https://github.com/nickderobertis/screencomp.

[capture]
# Captures run in a Linux container, but llmlint's shots are deterministic SVGs
# (a vendored, pinned font embedded into each file), so the bytes are identical
# on every arch and runner. One arch lane is therefore enough; its committed
# baseline is shots/baseline/x86_64.json.
arches = ["x86_64"]

[comment]
title = "Terminal screenshots"
marker = "screencomp"        # [A-Za-z0-9_-]; one sticky comment per marker
embed_limit = 10             # embed images inline when <= N shots differ (0 disables)

# One card per command (`lint`, `multi-judge`, `init`, `config`, `doctor`), all
# scripted in scripts/screenshots.sh. The `lint` card carries a `view` toggle the
# gallery flips between three levels of detail: the default report, the `-v`
# verbose report (which itemizes PASS/SKIP/N-A too), and the `-v` debug view (the
# oneharness command + raw result per judge, normally on stderr). The
# `multi-judge` card shows the per-judge breakdown a `judges: N` rule prints. The
# other cards have no toggles.
[[toggle]]
key = "view"
label = "View"
values = ["default", "verbose", "debug"]

[guard]
# Local pre-push guard (.githooks/pre-push): re-capture only when something that
# can change the rendered report changes — the formatter, the CLI surface, the
# capture machinery, or the vendored font.
paths = [
  "src/domain/report.rs",
  "src/domain/config.rs",
  "src/cli.rs",
  "src/commands/lint.rs",
  "src/commands/init.rs",
  "src/commands/config.rs",
  "src/commands/doctor.rs",
  "src/io/configfs.rs",
  "src/io/oneharness.rs",
  "scripts/screenshots.sh",
  "screenshots/**",
]
gallery = "shots/review"
